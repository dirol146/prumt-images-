<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Script → Image Prompts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --bg2: #141418;
    --bg3: #1c1c22;
    --border: rgba(255,255,255,0.07);
    --border-hi: rgba(255,255,255,0.15);
    --accent: #e8a830;
    --accent2: #c47d1a;
    --text: #f0ede6;
    --text2: #9a9690;
    --text3: #5a5752;
    --blue: #3b8bd4;
    --green: #4caf82;
    --red: #e85d42;
    --card-radius: 14px;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* — Header — */
  header {
    padding: 28px 40px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }
  .logo span { color: var(--text2); font-weight: 400; }
  .badge {
    font-size: 11px;
    color: var(--accent);
    border: 1px solid rgba(232,168,48,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    background: rgba(232,168,48,0.06);
    font-family: 'DM Mono', monospace;
  }

  /* — Layout — */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    min-height: 0;
  }

  /* — Left Panel — */
  .panel-left {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 32px 36px;
    gap: 20px;
  }
  .panel-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 4px;
  }
  textarea {
    flex: 1;
    min-height: 320px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 1.8;
    padding: 20px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  textarea:focus { border-color: var(--border-hi); }
  textarea::placeholder { color: var(--text3); }

  /* Style selector */
  .style-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .style-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .pill {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .pill:hover { border-color: var(--border-hi); color: var(--text); }
  .pill.active { border-color: var(--accent); color: var(--accent); background: rgba(232,168,48,0.08); }

  /* Generate button */
  .btn-generate {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 16px 28px;
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: var(--card-radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .btn-generate:hover { background: #f0b840; transform: translateY(-1px); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.2);
    border-top-color: #0d0d0f;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .btn-generate.loading .spinner { display: block; }
  .btn-generate.loading .btn-text { opacity: 0.7; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Export button */
  .btn-export {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 18px;
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    cursor: pointer;
    transition: all 0.15s;
    display: none;
  }
  .btn-export:hover { border-color: var(--border-hi); color: var(--text); }

  /* — Right Panel — */
  .panel-right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-right-header {
    padding: 28px 36px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .results-count {
    font-size: 12px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }
  .results-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 24px 36px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .results-scroll::-webkit-scrollbar { width: 4px; }
  .results-scroll::-webkit-scrollbar-track { background: transparent; }
  .results-scroll::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

  /* — Empty State — */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text3);
    padding: 60px 40px;
    text-align: center;
  }
  .empty-icon {
    width: 64px; height: 64px;
    border: 1px dashed var(--border-hi);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  .empty-state h3 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text2);
  }
  .empty-state p { font-size: 12px; line-height: 1.7; max-width: 260px; }

  /* — Prompt Card — */
  .prompt-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    overflow: hidden;
    animation: slideIn 0.3s ease both;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .card-num {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(232,168,48,0.1);
    border: 1px solid rgba(232,168,48,0.2);
    border-radius: 6px;
    padding: 3px 7px;
    white-space: nowrap;
    margin-top: 1px;
  }
  .card-sentence {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.65;
    font-style: italic;
  }
  .card-body { padding: 14px 16px; }
  .prompt-text {
    font-family: 'DM Mono', monospace;
    font-size: 11.5px;
    line-height: 1.75;
    color: var(--text);
    user-select: all;
  }
  .prompt-text .kw { color: var(--blue); }
  .prompt-text .val { color: var(--accent); }
  .card-footer {
    padding: 10px 16px 12px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .copy-btn-small {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 5px 12px;
    background: transparent;
    color: var(--text3);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn-small:hover { border-color: var(--accent); color: var(--accent); }
  .copy-btn-small.done { border-color: var(--green); color: var(--green); }
  .scene-tag {
    font-size: 10px;
    color: var(--text3);
    margin-left: auto;
  }

  /* Streaming dot */
  .streaming-card .prompt-text::after {
    content: '▋';
    color: var(--accent);
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Error */
  .error-msg {
    background: rgba(232,93,66,0.08);
    border: 1px solid rgba(232,93,66,0.2);
    border-radius: var(--card-radius);
    padding: 16px 20px;
    color: var(--red);
    font-size: 12px;
    line-height: 1.6;
  }

  /* Progress bar */
  .progress-bar {
    height: 2px;
    background: var(--border);
    position: relative;
    overflow: hidden;
    display: none;
  }
  .progress-bar.active { display: block; }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
  }

  /* Responsive */
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
    .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
    .panel-right { min-height: 500px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-dot"></span>
    Script<span>→</span>Prompts
    <span style="font-size:13px;font-weight:400;color:var(--text3);font-family:'DM Mono',monospace;">YouTube</span>
  </div>
  <div class="badge">Style Docu-Drama 2D</div>
</header>

<main>
  <!-- LEFT -->
  <div class="panel-left">
    <div>
      <div class="panel-label">Votre script</div>
    </div>

    <textarea id="script-input" placeholder="Collez votre script ici...

Exemple :
En 1982, l'Argentine envahit les îles Malouines. La flotte britannique appareilla depuis Portsmouth. Les soldats savaient que la bataille serait féroce. Le monde retenait son souffle.

Chaque phrase deviendra un prompt d'image."></textarea>

    <div class="style-row">
      <div class="panel-label">Ambiance visuelle</div>
      <div class="style-pills">
        <button class="pill active" data-style="military">⚔ Militaire / Guerre</button>
        <button class="pill" data-style="industrial">⚙ Industriel</button>
        <button class="pill" data-style="corporate">🏢 Corporatif</button>
        <button class="pill" data-style="exploration">🌍 Exploration</button>
        <button class="pill" data-style="political">🏛 Politique</button>
        <button class="pill" data-style="economic">📈 Économique</button>
        <button class="pill" data-style="disaster">🌊 Catastrophe</button>
        <button class="pill" data-style="neutral">✦ Neutre</button>
      </div>
    </div>

    <button class="btn-generate" id="gen-btn" onclick="generatePrompts()">
      <div class="spinner" id="spinner"></div>
      <span class="btn-text" id="btn-text">Générer les prompts</span>
    </button>

    <button class="btn-export" id="export-btn" onclick="exportAll()">⬇ Exporter tout (.txt)</button>
  </div>

  <!-- RIGHT -->
  <div class="panel-right">
    <div class="panel-right-header">
      <div class="panel-label">Prompts générés</div>
      <div class="results-count" id="results-count"></div>
    </div>
    <div class="progress-bar" id="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="results-scroll" id="results-area">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">✦</div>
        <h3>Prêt à générer</h3>
        <p>Collez votre script à gauche, choisissez une ambiance, puis cliquez sur "Générer les prompts".</p>
        <p style="margin-top:8px;font-size:11px;color:var(--text3)">Un prompt Midjourney / DALL·E par phrase.</p>
      </div>
    </div>
  </div>
</main>

<script>
const STYLE_CONTEXTS = {
  military: `The scene involves military, war, or conflict. Use soldiers, warships, weapons, smoke, ruins, trenches, or battlefields as appropriate.`,
  industrial: `The scene involves industrial work, engineering, or technology. Use workers in gear, machinery, pipes, gauges, oil platforms, factories, or technical infrastructure.`,
  corporate: `The scene involves business, finance, or politics. Use suited executives, boardrooms, maps, charts, newspapers, government buildings, or city skylines.`,
  exploration: `The scene involves discovery, travel, or expeditions. Use explorers, ships, maps, jungles, mountains, deserts, or remote landscapes.`,
  political: `The scene involves political events, diplomacy, or governance. Use leaders, parliaments, negotiations, crowds, flags, or official settings.`,
  economic: `The scene involves economics, markets, or industry. Use traders, factories, ports, currency, graphs, cargo ships, or financial districts.`,
  disaster: `The scene involves natural disasters, crises, or emergencies. Use flooding, storms, destroyed buildings, rescue workers, or dramatic weather.`,
  neutral: `Interpret the scene visually based on the text alone, choosing the most fitting environment and characters.`
};

let selectedStyle = 'military';
let allCards = [];

document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    selectedStyle = p.dataset.style;
  });
});

function splitSentences(text) {
  const raw = text
    .replace(/([.!?…])\s+/g, '$1\n')
    .split('\n')
    .map(s => s.trim())
    .filter(s => s.length > 8);
  return raw;
}

function setLoading(on) {
  const btn = document.getElementById('gen-btn');
  btn.disabled = on;
  btn.classList.toggle('loading', on);
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.getElementById('btn-text').textContent = on ? 'Génération...' : 'Générer les prompts';
}

function updateProgress(done, total) {
  const bar = document.getElementById('progress-bar');
  const fill = document.getElementById('progress-fill');
  if (total === 0) { bar.classList.remove('active'); return; }
  bar.classList.add('active');
  fill.style.width = Math.round((done / total) * 100) + '%';
  if (done >= total) setTimeout(() => bar.classList.remove('active'), 600);
}

async function generatePrompts() {
  const script = document.getElementById('script-input').value.trim();
  if (!script) { alert('Veuillez coller votre script.'); return; }

  const sentences = splitSentences(script);
  if (sentences.length === 0) { alert('Aucune phrase détectée.'); return; }

  setLoading(true);
  allCards = [];

  const area = document.getElementById('results-area');
  document.getElementById('empty-state')?.remove();
  area.innerHTML = '';
  document.getElementById('results-count').textContent = `0 / ${sentences.length}`;
  document.getElementById('export-btn').style.display = 'none';
  updateProgress(0, sentences.length);

  const styleContext = STYLE_CONTEXTS[selectedStyle] || STYLE_CONTEXTS.neutral;

  for (let i = 0; i < sentences.length; i++) {
    const sentence = sentences[i];
    const card = createCard(i + 1, sentence, sentences.length);
    area.appendChild(card.el);
    card.el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    try {
      const prompt = await fetchPrompt(sentence, styleContext, i, sentences);
      card.setPrompt(prompt);
      allCards.push({ sentence, prompt });
    } catch (e) {
      card.setError(e.message);
    }

    document.getElementById('results-count').textContent = `${i + 1} / ${sentences.length}`;
    updateProgress(i + 1, sentences.length);
  }

  setLoading(false);
  document.getElementById('export-btn').style.display = 'block';
}

function createCard(num, sentence, total) {
  const el = document.createElement('div');
  el.className = 'prompt-card streaming-card';
  el.style.animationDelay = '0ms';
  el.innerHTML = `
    <div class="card-header">
      <div class="card-num">SCÈNE ${String(num).padStart(2,'0')}</div>
      <div class="card-sentence">"${sentence}"</div>
    </div>
    <div class="card-body">
      <div class="prompt-text" id="pt-${num}">Analyse en cours</div>
    </div>
    <div class="card-footer">
      <button class="copy-btn-small" onclick="copyCard(${num}, this)">Copier</button>
      <span class="scene-tag">${num} / ${total}</span>
    </div>`;

  function setPrompt(text) {
    el.classList.remove('streaming-card');
    const pt = el.querySelector(`#pt-${num}`);
    pt.textContent = text;
    pt.innerHTML = syntaxHighlight(text);
  }

  function setError(msg) {
    el.classList.remove('streaming-card');
    const pt = el.querySelector(`#pt-${num}`);
    pt.innerHTML = `<span style="color:var(--red)">Erreur: ${msg}</span>`;
  }

  return { el, setPrompt, setError };
}

function syntaxHighlight(text) {
  return text
    .replace(/(--[a-z0-9]+)/gi, '<span class="kw">$1</span>')
    .replace(/::\s*([^,\n]+)/g, ':: <span class="val">$1</span>');
}

async function fetchPrompt(sentence, styleContext, index, allSentences) {
  const prevSentence = index > 0 ? allSentences[index - 1] : null;
  const nextSentence = index < allSentences.length - 1 ? allSentences[index + 1] : null;

  const systemPrompt = `You are an expert prompt engineer for AI image generators (Midjourney, DALL·E 3, Stable Diffusion).

Your task: given a sentence from a YouTube documentary script, generate ONE precise image generation prompt.

STYLE RULES (always apply these, no exception):
- Art style: 2D cinematic illustration, "Ligne Claire" style, bold consistent black outlines, flat cel-shading
- Quality: high-definition digital vector art, clean flat colors
- Color palette: deep ocean blue, mustard yellow #E8A830, slate grey, cloud white
- Lighting: high contrast cinematic, cool blue exterior, warm amber interior, hard-edged cel shadows
- Characters: expressive faces, small pupils, thick outlines, context-appropriate clothing
- Composition: rule of thirds, deep focus, cinematic framing
- Always end with: --ar 16:9, no text, no watermarks, no logos

CONTEXT RULE:
${styleContext}

OUTPUT FORMAT:
Return ONLY the prompt text. No explanation, no preamble, no quotes around it.
The prompt must be in English.
Structure: [main scene description], [character details if any], [environment/atmosphere], [lighting], [style tags], --ar 16:9

Keep it under 120 words. Be specific and visual.`;

  const userMsg = `Script sentence to illustrate: "${sentence}"
${prevSentence ? `Previous sentence (context): "${prevSentence}"` : ''}
${nextSentence ? `Next sentence (context): "${nextSentence}"` : ''}

Generate the image prompt for this sentence.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userMsg }]
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${res.status}`);
  }

  const data = await res.json();
  const text = data.content?.find(b => b.type === 'text')?.text?.trim();
  if (!text) throw new Error('Réponse vide');
  return text;
}

function copyCard(num, btn) {
  const pt = document.getElementById(`pt-${num}`);
  const text = pt.textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copié';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = 'Copier'; btn.classList.remove('done'); }, 2000);
  });
}

function exportAll() {
  if (!allCards.length) return;
  const lines = allCards.map((c, i) =>
    `=== SCÈNE ${String(i+1).padStart(2,'0')} ===\nPhrase : ${c.sentence}\n\nPrompt :\n${c.prompt}\n`
  ).join('\n');
  const blob = new Blob([lines], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'prompts_youtube.txt';
  a.click(); URL.revokeObjectURL(url);
}
</script>
</body>
</html>
