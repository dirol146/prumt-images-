
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Script → Image Prompts</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --bg2: #141418;
    --bg3: #1c1c22;
    --border: rgba(255,255,255,0.07);
    --border-hi: rgba(255,255,255,0.15);
    --accent: #e8a830;
    --accent2: #c47d1a;
    --text: #f0ede6;
    --text2: #9a9690;
    --text3: #5a5752;
    --blue: #3b8bd4;
    --green: #4caf82;
    --red: #e85d42;
    --card-radius: 14px;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* — Header — */
  header {
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }
  .logo span { color: var(--text2); font-weight: 400; }
  
  /* — API Key Input — */
  .api-config {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg2);
    padding: 8px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .api-config input {
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 11px;
    outline: none;
    width: 150px;
  }

  /* — Layout — */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    min-height: 0;
  }

  /* — Left Panel — */
  .panel-left {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 32px 36px;
    gap: 20px;
  }
  .panel-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 4px;
  }
  textarea {
    flex: 1;
    min-height: 320px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 1.8;
    padding: 20px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  textarea:focus { border-color: var(--border-hi); }
  
  .style-pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
  }
  .pill.active { border-color: var(--accent); color: var(--accent); background: rgba(232,168,48,0.08); }

  .btn-generate {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    padding: 16px;
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: var(--card-radius);
    cursor: pointer;
  }

  /* — Right Panel — */
  .panel-right { display: flex; flex-direction: column; overflow: hidden; }
  .results-scroll { flex: 1; overflow-y: auto; padding: 24px 36px; display: flex; flex-direction: column; gap: 16px; }

  .prompt-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--card-radius); margin-bottom: 10px; }
  .card-header { padding: 12px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .card-body { padding: 15px; font-size: 13px; color: var(--accent); line-height: 1.5; }

  .kw { color: var(--blue); }
  .val { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-dot"></span>
    Script<span>→</span>Prompts
  </div>
  <div class="api-config">
    <span style="font-size:10px; color:var(--text3)">CLÉ ANTHROPIC:</span>
    <input type="password" id="api-key" placeholder="sk-ant-...">
  </div>
</header>

<main>
  <div class="panel-left">
    <div class="panel-label">Votre script</div>
    <textarea id="script-input" placeholder="Collez votre script ici..."></textarea>
    
    <div class="panel-label">Style</div>
    <div class="style-pills">
        <button class="pill active" data-style="military">⚔ Militaire</button>
        <button class="pill" data-style="industrial">⚙ Industriel</button>
        <button class="pill" data-style="exploration">🌍 Exploration</button>
    </div>

    <button class="btn-generate" id="gen-btn" onclick="generatePrompts()">Générer les prompts</button>
  </div>

  <div class="panel-right">
    <div class="results-scroll" id="results-area">
      </div>
  </div>
</main>

<script>
const STYLE_CONTEXTS = {
  military: `Military/war scene. 2D Ligne Claire style. High contrast.`,
  industrial: `Industrial/engineering scene. 2D Ligne Claire style.`,
  exploration: `Discovery/landscape scene. 2D Ligne Claire style.`
};

let selectedStyle = 'military';

document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    selectedStyle = p.dataset.style;
  });
});

async function generatePrompts() {
  const key = document.getElementById('api-key').value;
  const script = document.getElementById('script-input').value;
  if(!key) return alert("Entrez votre clé API Anthropic en haut de page.");
  
  const sentences = script.split(/[.!?]/).filter(s => s.trim().length > 5);
  const area = document.getElementById('results-area');
  area.innerHTML = '';

  for (let i = 0; i < sentences.length; i++) {
    const card = document.createElement('div');
    card.className = 'prompt-card';
    card.innerHTML = `<div class="card-header">Scène ${i+1}</div><div class="card-body" id="res-${i}">Génération...</div>`;
    area.appendChild(card);

    try {
      const prompt = await fetchAnthropic(sentences[i], key);
      document.getElementById(`res-${i}`).innerText = prompt;
    } catch (e) {
      document.getElementById(`res-${i}`).innerText = "Erreur: Vérifiez votre clé ou connexion.";
    }
  }
}

async function fetchAnthropic(text, key) {
  // Note: En mode navigateur direct, Anthropic bloque souvent via CORS. 
  // Ce code est prêt pour un proxy ou une extension CORS.
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'dangerously-allow-browser': 'true' // Requis pour tester en direct
    },
    body: JSON.stringify({
      model: "claude-3-haiku-20240307",
      max_tokens: 200,
      messages: [{role: "user", content: `Generate a Midjourney prompt for: ${text}. Style: ${STYLE_CONTEXTS[selectedStyle]}. Format: Prompt text only.`}]
    })
  });
  const data = await response.json();
  return data.content[0].text;
}
</script>
</body>
</html>
